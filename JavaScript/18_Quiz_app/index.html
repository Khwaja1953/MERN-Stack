<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <h1>Smart Quiz App</h1>
    </header>
    <section id="start-screen">
        <div class="card">
            <h2>Welcome to our Quiz App</h2>
        <p>Test you knowledge by Answering these 10 Question</p>
        <ul>
            <li>15 seconds per question</li>
            <li>No Backtracking</li>
            <li>Track you progress in real time</li>
        </ul>
        <button id="start-btn">Start Quiz</button>
        </div>
    </section>
    <section id="quiz-screen">
        <div class="card">
            <div class="quiz-header">
                <span id="progress">Question 1 out of 10</span>
                <div id="timer-box">
                    <span id="timer">15</span>
                </div>
                </div>
                <div class="quiz-body">

                    <h3 id="question-text">Question</h3>
                    <div id="options-container"></div>
                </div>
        </div>
    </section>
    <section id="result-screen">
        <h1>Result Screen</h1>
        <h2 id="score"></h2>
        <h3 id="highScore"></h3>
        <button id="restartBtn">Try again</button>
    </section>

    <script src="./script.js"></script>
</body>
</html>
